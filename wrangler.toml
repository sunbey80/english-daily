# Cloudflare 配置：Pages + Cron Triggers（§7）
name = "english-daily"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]

# 每日生成与发布：UTC 00:00 = 北京时间 08:00
# 建议实际可提前到 06:00 生成、08:00 发布，给校验重试留缓冲（见 §7）
[triggers]
crons = ["0 0 * * *"]

# 注：Supabase 密钥等通过 Cloudflare 环境变量/Secrets 注入，
# 本地开发使用 .env.local（见 .env.local.example）。
