# Cloudflare Workers 部署配置（OpenNext 适配）
# 构建产物由 `opennextjs-cloudflare build` 生成到 .open-next/
name = "english-daily"
main = ".open-next/worker.js"
compatibility_date = "2025-03-25"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# 注：每日生成与发布（§7）的 Cron 触发是独立 worker（含 scheduled 处理器），
# 与本 web worker 分开部署，避免耦合。届时单独配置 crons = ["0 0 * * *"]。
