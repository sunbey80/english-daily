name: Daily chapter generation

# 每天北京时间约 08:20 自动生成并发布下一章。
# 00:20 UTC = 北京时间 08:20。也可在 Actions 页手动触发（Run workflow）。
# 注：刻意避开整点（00:00 UTC 是 GitHub 定时任务最拥堵、最易被延迟/丢弃的时段）。
# GitHub 定时任务为尽力而为，偶有延迟属正常；漏跑可手动触发或等次日。
on:
  schedule:
    - cron: '20 0 * * *'
  workflow_dispatch:

# 公开值（非密钥）直接写在这里
env:
  NEXT_PUBLIC_SUPABASE_URL: https://kbtycoqitreovqjdidnr.supabase.co
  OPENROUTER_MODEL: anthropic/claude-sonnet-4.6

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: 生成并发布今日章节
        # 章节写入 Supabase（publish_at=现在），线上 /today 立即可见，无需重新部署。
        # 目标词由 LLM 自动选取（四级之上 + 未教过）；翻译/释义自动入库。
        env:
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: npx tsx scripts/generate-chapter.ts --save
