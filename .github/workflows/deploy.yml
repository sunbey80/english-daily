name: Deploy to Cloudflare Workers

# push 到 master 即自动构建并部署；也可在 Actions 页手动触发。
# 构建跑在 GitHub 的 Linux runner（OpenNext 官方支持环境），不在本地 Windows 构建。
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build (OpenNext)
        # NEXT_PUBLIC_* 在 next build 时被内联进产物，必须在构建期注入
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
        run: npx opennextjs-cloudflare build

      - name: Deploy + 上传运行时密钥
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          # 这些是服务端运行时密钥，作为 Worker secret 上传（不会进客户端包）
          secrets: |
            SUPABASE_SECRET_KEY
            OPENROUTER_API_KEY
            OPENROUTER_MODEL
            GENERATE_SECRET
        env:
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          GENERATE_SECRET: ${{ secrets.GENERATE_SECRET }}
