name: Deploy to Cloudflare Workers

# push 到 master 即自动构建并部署；也可在 Actions 页手动触发。
# 构建跑在 GitHub 的 Linux runner（OpenNext 官方支持环境），不在本地 Windows 构建。
on:
  push:
    branches: [master]
  workflow_dispatch:

# 公开值（会被打进客户端包/出现在 URL，非密钥）直接写在这里，
# 避免依赖手动配置 GitHub secret：
#   - NEXT_PUBLIC_* 是设计上要发到浏览器的（Supabase publishable key 可安全公开）
#   - CLOUDFLARE_ACCOUNT_ID 是账号标识符，非凭据
#   - OPENROUTER_MODEL 只是模型名
env:
  NEXT_PUBLIC_SUPABASE_URL: https://kbtycoqitreovqjdidnr.supabase.co
  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_KWgm0HkVvFUSKjH7xSGR-g_UjJMMKst
  CLOUDFLARE_ACCOUNT_ID: c9f0999f6f6163a7afd4f12811387554
  OPENROUTER_MODEL: anthropic/claude-sonnet-4.6

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build (OpenNext)
        run: npx opennextjs-cloudflare build

      # 先部署（创建/更新 Worker）。首次部署必须先建出 Worker，密钥才有对象可挂。
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      # 再把服务端运行时密钥上传到已存在的 Worker（不会进客户端包）。
      - name: 上传运行时密钥
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          secrets: |
            SUPABASE_SECRET_KEY
            OPENROUTER_API_KEY
            OPENROUTER_MODEL
            GENERATE_SECRET
        env:
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ env.OPENROUTER_MODEL }}
          GENERATE_SECRET: ${{ secrets.GENERATE_SECRET }}
